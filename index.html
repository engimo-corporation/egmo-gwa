<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGIMO GWA Workspace</title>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://static.engimo.org/css/apps/gwa/gwa.css" />
</head>
<body>

    <!-- ==========================================
         PHASE 1: LOADING ANIMATION
         ========================================== -->
    <div id="view-loading" class="view-section active">
        <div class="loading-container">
            <div class="loading-text">Initializing ENGIMO...</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill"></div>
            </div>
            <div style="margin-top: 10px; font-size: 11px; color: #666;">Contacting secure authentication servers...</div>
        </div>
    </div>


    <!-- ==========================================
         PHASE 2: AUTHENTICATION PROMPT
         ========================================== -->
    <div id="view-auth" class="view-section">
        <div class="auth-box">
            <i class="fa-solid fa-lock auth-icon"></i>
            <div class="auth-title">Client Login</div>
            <p class="auth-subtitle">
                Please connect your trusted ENGIMO ID to access the Global Workspace securely.
            </p>
            
            <button class="auth-btn" onclick="triggerClerkLogin()">Secure Login →</button>
            <div class="auth-msg" id="auth-msg"></div>
        </div>
    </div>


    <!-- ==========================================
         PHASE 3: MAIN APP UI
         ========================================== -->
    <div id="view-main" class="view-section">
        <div class="sidebar" id="sidebar">
            <div id="user-button-area"></div>
            <!-- Dynamic sidebar buttons go here -->
        </div>

        <div class="main-content">
            <h1 id="main-title">ENGIMO Global Workspace</h1>
            <div id="sections-container">
                <!-- Dynamically populated content will go here -->
            </div>
        </div>
    </div>


    <!-- ==========================================
         JAVASCRIPT LOGIC
         ========================================== -->
    <script>
        const CLERK_FRONTEND_API = "clerk.engimo.org";
        const CLERK_SIGN_IN_URL = "https://accounts.engimo.org/sign-in";

        let minimumLoadingFinished = false;
        let clerkReady = false;

        const clerkScript = document.createElement('script');
        clerkScript.setAttribute('data-clerk-frontend-api', CLERK_FRONTEND_API);
        clerkScript.async = true;
        clerkScript.crossOrigin = 'anonymous';
        clerkScript.src = `https://${CLERK_FRONTEND_API}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js`;
        clerkScript.onload = async () => {
            await window.Clerk.load();
            clerkReady = true;
            checkAuthAndTransition();
        };
        document.head.appendChild(clerkScript);

        window.onload = () => {
            setTimeout(() => {
                minimumLoadingFinished = true;
                checkAuthAndTransition();
            }, 1500); // 1.5s matches the fake loading bar CSS animation
        };

        function checkAuthAndTransition() {
            if (!minimumLoadingFinished || !clerkReady) return;

            if (window.Clerk.user) {
                mountUserButton();
                loadPayload();
                switchView('view-main');
            } else {
                switchView('view-auth');
            }
        }

        function loadPayload() {
            const script = document.createElement('script');
            script.src = 'https://static.engimo.org/js/gwa/gwa_payload.js';
            document.body.appendChild(script);
        }

        function triggerClerkLogin() {
            const msgBox = document.getElementById('auth-msg');
            msgBox.innerText = "Redirecting over secure connection...";
            window.Clerk.redirectToSignIn({ 
                signInUrl: CLERK_SIGN_IN_URL 
            });
        }

        function mountUserButton() {
            const container = document.getElementById('user-button-area');
            window.Clerk.mountUserButton(container);
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }
    </script>
</body>
</html>
