<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGIMO GWA | Workspace</title>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        /* =========================================
           FRUTIGER METRO THEME CORE
           ========================================= */
        :root {
            --metro-blue: #00abec;
            --metro-orange: #ff9900;
            --metro-dark: #111111;
            --metro-surface: #1d1d1d;
            --metro-text: #ffffff;
            --metro-text-dim: #a0a0a0;
            --border-glow: rgba(0, 171, 236, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background-color: var(--metro-dark);
            /* Classic Metro/Zune era subtle gradient texture */
            background-image: radial-gradient(circle at top right, #1a2a3a 0%, #111111 100%);
            color: var(--metro-text);
            font-family: "Segoe UI", "Segoe UI Web Regular", "Tahoma", "Arial", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* View toggles */
        .view-section { 
            display: none; 
            width: 100%; 
            height: 100vh; 
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        .view-section.active { 
            display: flex; 
            opacity: 1;
        }

        /* =========================================
           PHASE 1: LOADING SCREEN (Metro Style)
           ========================================= */
        #view-loading {
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .metro-loader {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        /* Classic Metro "moving dots" loader */
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--metro-blue);
            border-radius: 50%;
            animation: metroDot 1.5s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes metroDot {
            0%, 100% { transform: scale(0.5); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* =========================================
           PHASE 2: AUTH SCREEN (Bold Metro Typography)
           ========================================= */
        #view-auth {
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #001f3f 0%, #000000 100%);
        }

        .auth-tile {
            text-align: left;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        .auth-tile h1 {
            font-size: 72px;
            font-weight: 200; /* Signature Segoe light weight */
            line-height: 0.9;
            margin-bottom: 20px;
            color: var(--metro-blue);
            text-transform: lowercase;
        }

        .auth-tile p {
            font-size: 24px;
            font-weight: 300;
            color: var(--metro-text-dim);
            margin-bottom: 40px;
        }

        .btn-metro {
            background-color: transparent;
            border: 3px solid #ffffff;
            color: #ffffff;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .btn-metro:hover {
            background-color: #ffffff;
            color: var(--metro-dark);
        }

        /* =========================================
           PHASE 3: MAIN APP UI (Grid Based)
           ========================================= */
        #view-main {
            display: flex;
        }

        /* Sidebar: High Contrast Dark */
        .sidebar {
            width: 100px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            border-right: 1px solid #333;
        }

        #user-button-area {
            margin-bottom: 30px;
            border: 2px solid var(--metro-blue);
            padding: 2px;
            border-radius: 50%;
        }

        .sidebar-btn {
            width: 60px;
            height: 60px;
            background: var(--metro-surface);
            border: none;
            color: var(--metro-text-dim);
            font-size: 24px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar-btn:hover {
            background: #333;
            color: #fff;
        }

        .sidebar-btn.active {
            background: var(--metro-blue);
            color: white;
        }

        /* Main Workspace: Focus on content grid */
        .main-content {
            flex: 1;
            padding: 60px;
            overflow-y: auto;
        }

        #main-title {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 40px;
            color: var(--metro-blue);
        }

        .letter-section {
            margin-bottom: 50px;
        }

        .letter-header {
            font-size: 28px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--metro-orange);
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        /* Metro Tiles */
        .content-btn {
            aspect-ratio: 1 / 1;
            background-color: var(--metro-surface);
            border: none;
            color: white;
            padding: 15px;
            font-size: 16px;
            font-weight: 400;
            text-align: left;
            display: flex;
            align-items: flex-end;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .content-btn:hover {
            background-color: var(--metro-blue);
            transform: scale(1.02);
        }

        .content-btn:active {
            transform: scale(0.95);
        }

        .empty-message {
            color: #555;
            font-style: italic;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--metro-dark); }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

    </style>
</head>
<body>

    <div id="view-loading" class="view-section active">
        <div class="metro-loader">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300;">Engimo Syncing</div>
    </div>

    <div id="view-auth" class="view-section">
        <div class="auth-tile">
            <h1>welcome to engimo.</h1>
            <p>Your workspace is ready. Secure ownership begins with your ID.</p>
            <button class="btn-metro" onclick="triggerClerkLogin()">CONNECT NOW</button>
            <div id="auth-msg" style="margin-top: 20px; color: var(--metro-orange); height: 20px;"></div>
        </div>
    </div>

    <div id="view-main" class="view-section">
        <div class="sidebar" id="sidebar">
            <div id="user-button-area"></div>
            <!-- Dynamic buttons rendered here -->
        </div>

        <div class="main-content">
            <h1 id="main-title">workspace</h1>
            <div id="sections-container"></div>
        </div>
    </div>

    <script>
        const CLERK_FRONTEND_API = "clerk.engimo.org";
        const CLERK_SIGN_IN_URL = "https://accounts.engimo.org/sign-in";

        let minimumLoadingFinished = false;
        let clerkReady = false;

        const clerkScript = document.createElement('script');
        clerkScript.setAttribute('data-clerk-frontend-api', CLERK_FRONTEND_API);
        clerkScript.async = true;
        clerkScript.crossOrigin = 'anonymous';
        clerkScript.src = `https://${CLERK_FRONTEND_API}/npm/@clerk/clerk-js@latest/dist/clerk.browser.js`;
        clerkScript.onload = async () => {
            await window.Clerk.load();
            clerkReady = true;
            checkAuthAndTransition();
        };
        document.head.appendChild(clerkScript);

        window.onload = () => {
            setTimeout(() => {
                minimumLoadingFinished = true;
                checkAuthAndTransition();
            }, 1800);
        };

        function checkAuthAndTransition() {
            if (!minimumLoadingFinished || !clerkReady) return;

            if (window.Clerk.user) {
                mountUserButton();
                loadPayload();
                switchView('view-main');
            } else {
                switchView('view-auth');
            }
        }

        function loadPayload() {
            const script = document.createElement('script');
            script.src = 'https://static.engimo.org/js/gwa/gwa_payload.js';
            document.body.appendChild(script);
        }

        function triggerClerkLogin() {
            const msgBox = document.getElementById('auth-msg');
            msgBox.innerText = "ESTABLISHING ENCRYPTED LINK...";
            window.Clerk.redirectToSignIn({ 
                signInUrl: CLERK_SIGN_IN_URL 
            });
        }

        function mountUserButton() {
            const container = document.getElementById('user-button-area');
            window.Clerk.mountUserButton(container);
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            setTimeout(() => {
                document.getElementById(viewId).classList.add('active');
            }, 50);
        }
    </script>
</body>
</html>
